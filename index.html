<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BULK Mystery Gacha - One Chance</title>
    <style>
        * { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        #name-input { user-select: text !important; -webkit-user-select: text !important; }
        
        :root { 
            --common-color: #888888; 
            --epic-color: #a335ee; 
            --legendary-color: #ff8000; 
            --current-color: #444444; 
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            font-family: 'Segoe UI', sans-serif; perspective: 1500px; touch-action: none; 
        }

        #particles-js { 
            position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: 1; 
            background: 
                radial-gradient(circle at 20% 30%, rgba(20, 20, 50, 0.8) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(40, 0, 40, 0.8) 0%, transparent 50%),
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: cover, cover, 60px 60px, 60px 60px;
            animation: spaceDrift 20s linear infinite alternate;
            pointer-events: none;
        }

        @keyframes spaceDrift {
            from { background-position: 0% 0%, 0% 0%, 0px 0px, 0px 0px; }
            to { background-position: 100% 100%, 100% 100%, 30px 30px, 30px 30px; }
        }

        .header-brand { position: fixed; top: 30px; left: 30px; display: flex; align-items: center; gap: 15px; z-index: 2000; }
        #logo-img { width: 45px; height: 45px; object-fit: contain; }
        #bulk-label { color: #fff; font-family: serif; font-size: 32px; letter-spacing: 6px; text-transform: uppercase; }

        #creator-credit {
            position: fixed; top: 35px; right: 30px;
            z-index: 2000; color: rgba(255, 255, 255, 0.3);
            font-family: serif; font-size: 16px; letter-spacing: 2px;
            text-decoration: none; transition: 0.3s;
        }
        #creator-credit:hover { color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.8); }

        #intro-overlay { 
            position: fixed; inset: 0; 
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); 
            z-index: 1500; display: flex; justify-content: center; align-items: center; 
            transition: 0.8s; 
        }
        #intro-overlay.hidden { opacity: 0; visibility: hidden; }

        /* ✅ ПРИБРАНО СИНИЙ КОЛІР - ТЕПЕР БІЛИЙ/СІРИЙ */
        .btn { 
            padding: 12px 35px; 
            border-radius: 4px; 
            border: 1px solid #fff; 
            background: transparent; 
            color: #fff; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-size: 12px; 
            letter-spacing: 3px; 
            transition: 0.4s; 
        }
        .btn:hover:not(:disabled) { 
            background: #fff; 
            color: #000; 
            box-shadow: 0 0 25px #fff; 
        }
        .btn:disabled { 
            opacity: 0.3; 
            cursor: not-allowed; 
            border-color: #333; 
        }

        .tilt-container { z-index: 100; display: none; perspective: 1500px; }
        .tilt-container.show { display: block; }

        /* ✅ ПРИБРАНО СИНЮ ОБВОДКУ КАРТКИ */
        .card-container { 
            width: 340px; 
            height: 480px; 
            background: #0a0a0a; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 2px solid #333; 
            position: relative; 
            transition: 1s; 
        }
        .card-container.revealed { 
            border: 2px solid #fff; 
            box-shadow: 0 0 50px var(--current-color); 
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 150; cursor: crosshair; touch-action: none; }
        .art { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 50; opacity: 0; transition: 1s; }
        .art.visible { opacity: 1; }

        #rarity-label { position: absolute; top: 40px; width: 100%; text-align: center; z-index: 60; font-weight: 900; font-size: 28px; text-transform: uppercase; letter-spacing: 8px; color: #fff; opacity: 0; transition: 1s; text-shadow: 0 0 15px rgba(0,0,0,0.5); }
        #rarity-label.visible { opacity: 1; }

        #owner-name { position:absolute; bottom:25px; width:100%; text-align:center; color:rgba(255,255,255,0.5); font-size:11px; z-index:60; letter-spacing:3px; text-transform: uppercase; }

        .controls { margin-top: 30px; z-index: 1000; display: none; }
        .controls.visible { display: block; }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="header-brand">
        <img id="logo-img" src="logo.png">
        <div id="bulk-label">BULK</div>
    </div>
    
    <a href="https://x.com/The_MasonX" target="_blank" id="creator-credit">by masonx</a>

    <div id="intro-overlay">
        <div style="text-align: center;">
            <!-- ✅ ПРИБРАНО СИНЮ ОБВОДКУ В ІНПУТІ -->
            <input type="text" id="name-input" placeholder="ENTER USERNAME" style="padding:15px; background:rgba(255,255,255,0.05); border:1px solid #555; color:#fff; border-radius:4px; margin-bottom:25px; text-align:center; outline:none; width: 250px; font-family: inherit;"><br>
            <button class="btn" id="start-btn">START</button>
            <p id="error-msg" style="color: #ff4444; font-size: 11px; margin-top: 15px; display: none; letter-spacing: 1px;">DATABASE: ACCESS DENIED - CHANCE USED</p>
        </div>
    </div>

    <div class="tilt-container" id="tilt-card">
        <div class="card-container" id="card-to-save">
            <div id="rarity-label">COMMON</div>
            <div id="owner-name"></div>
            <img id="main-art" src="" class="art">
            <canvas id="scratch" width="340" height="480"></canvas>
        </div>
    </div>

    <div class="controls" id="post-game-controls">
        <button class="btn" disabled style="border-color:#333; color:#555;">DATA RECORDED</button>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        const gallery = {
            legendary: ["my_art1.png","my_art5.png","my_art7.png","my_art13.png","my_art18.png","my_art23.png","my_art25.png","my_art30.png"], 
            epic: ["my_art2.png","my_art4.png","my_art8.png","my_art12.png","my_art15.png","my_art20.png","my_art22.png","my_art28.png","my_art29.png","my_art31.png"],
            common: ["my_art3.png","my_art6.png","my_art9.png","my_art10.png","my_art11.png","my_art14.png","my_art16.png","my_art17.png","my_art19.png","my_art21.png","my_art24.png","my_art26.png","my_art27.png","my_art32.png"],
        };

        const canvas = document.getElementById('scratch');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const artImg = document.getElementById('main-art');
        const card = document.getElementById('card-to-save');
        const tiltContainer = document.getElementById('tilt-card');
        
        let isDrawing = false, isRevealed = false, currentUser = "";
        let nextRarity, nextColor, nextName;

        document.getElementById('start-btn').onclick = () => {
            const inputName = document.getElementById('name-input').value.trim().toUpperCase();
            if (!inputName) return alert("Enter Username!");

            const usedNames = JSON.parse(localStorage.getItem('bulk_v4_system') || "[]");
            if (usedNames.includes(inputName)) {
                document.getElementById('error-msg').style.display = 'block';
                return;
            }

            currentUser = inputName;
            document.getElementById('owner-name').innerText = "OWNER: " + currentUser;
            document.getElementById('intro-overlay').classList.add('hidden');
            tiltContainer.classList.add('show');
            init();
        };

        function init() {
            let roll = Math.random() * 100;
            if (roll < 10) { nextRarity = 'legendary'; nextName = 'LEGENDARY'; nextColor = '#ff8000'; }
            else if (roll < 40) { nextRarity = 'epic'; nextName = 'EPIC'; nextColor = '#a335ee'; }
            else { nextRarity = 'common'; nextName = 'COMMON'; nextColor = '#888888'; }

            artImg.src = gallery[nextRarity][Math.floor(Math.random() * gallery[nextRarity].length)];
            artImg.onload = () => artImg.classList.add('visible');

            ctx.fillStyle = '#121212';
            ctx.fillRect(0, 0, 340, 480);
            ctx.fillStyle = '#fff';
            ctx.font = '900 16px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('SCRATCH TO REVEAL', 170, 240);
        }

        function revealCard() {
            if (isRevealed) return;
            isRevealed = true;
            
            const usedNames = JSON.parse(localStorage.getItem('bulk_v4_system') || "[]");
            usedNames.push(currentUser);
            localStorage.setItem('bulk_names_v3', JSON.stringify(usedNames));

            document.documentElement.style.setProperty('--current-color', nextColor);
            document.getElementById('rarity-label').innerText = nextName;
            document.getElementById('rarity-label').classList.add('visible');
            card.classList.add('revealed');
            ctx.clearRect(0, 0, 340, 480); 
            document.getElementById('post-game-controls').classList.add('visible');
        }

        function handleMove(e) {
            if (!isDrawing || isRevealed) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath(); ctx.arc(x, y, 35, 0, Math.PI * 2); ctx.fill();
            
            const data = ctx.getImageData(0, 0, 340, 480).data;
            let count = 0;
            for (let i = 3; i < data.length; i += 4) if (data[i] === 0) count++;
            if (count > (data.length / 4) * 0.45) revealCard();
        }

        canvas.addEventListener('mousedown', () => isDrawing = true);
        window.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mousemove', handleMove);
        canvas.addEventListener('touchstart', (e) => { isDrawing = true; e.preventDefault(); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { handleMove(e); e.preventDefault(); }, {passive: false});

        particlesJS("particles-js", { 
            "particles": { 
                "number": { "value": 50 }, 
                "color": { "value": "#ffffff" }, 
                "size": { "value": 1, "random": true }, 
                "move": { "enable": true, "speed": 1, "random": true },
                "interact": { "enable": true, "mode": "grab" }
            } 
        });

        document.addEventListener('mousemove', (e) => {
            if (!tiltContainer.classList.contains('show')) return;
            const x = (window.innerWidth / 2 - e.clientX) / 40;
            const y = (window.innerHeight / 2 - e.clientY) / 40;
            tiltContainer.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
        });
    </script>
</body>
</html>
